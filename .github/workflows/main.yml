name: Build iOS Menu UI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        unzip ImGui.zip -d .
        cp -R ImGui/* . || true
        cp -R iOS-Imgui-ModMenu-main/* . || true
        cp -R iOS-ImGui-ModMenu-d-main/* . || true

    - name: Smart Code & Directory Patch
      run: |
        # Create a dummy Mods.mm to satisfy the Makefile
        touch Mods.mm
        echo "void LoadMods() {}" >> Mods.mm
        echo "int _mods = 0;" >> Mods.mm

        # Inject absolute include paths and ultimate bypass flags into Makefile
        if [ -f Makefile ]; then
          # Fix ImGui include path missing error
          echo "ADDITIONAL_CFLAGS = -I. -I./ImGui -I./Includes -Wno-error -Wno-everything" >> Makefile
          echo "ADDITIONAL_OBJCFLAGS = -I. -I./ImGui -I./Includes -Wno-error -Wno-everything" >> Makefile
          echo "ADDITIONAL_CCFLAGS = -I. -I./ImGui -I./Includes -Wno-error -Wno-everything" >> Makefile
        fi
        
        # Bypass strict C++ template errors inside Unity.h
        if [ -f Includes/Unity/Unity.h ]; then
          sed -i '' 's/->template toCPPList/->toCPPList/g' Includes/Unity/Unity.h
        fi

        # Fix extern "C" stdint.h module import error inside Dobby header
        if [ -f Includes/Hooks/dobby_defines.h ]; then
          sed -i '' 's/#include <stdint.h>//g' Includes/Hooks/dobby_defines.h
          sed -i '' '1s/^/#include <stdint.h>\n/' Includes/Hooks/dobby_defines.h
        fi
        if [ -f Includes/Hooking/../Libs/dobby_defines.h ]; then
          sed -i '' 's/#include <stdint.h>//g' Includes/Hooking/../Libs/dobby_defines.h
          sed -i '' '1s/^/#include <stdint.h>\n/' Includes/Hooking/../Libs/dobby_defines.h
        fi

    - name: Set up Manual Theos Environment
      run: |
        brew install ldid xz
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: Link Built-in iOS SDK
      run: |
        mkdir -p ~/theos/sdks
        SYS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        ln -s "$SYS_SDK" ~/theos/sdks/iPhoneOS.sdk

    - name: Compile Project
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1 GO_EASY=1

    - name: Upload .dylib Artifact
      uses: actions/upload-artifact@v4
      with:
        name: iOS-Menu-Dylib
        path: .theos/obj/*.dylib
