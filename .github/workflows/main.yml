name: Build iOS Menu UI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        unzip ImGui.zip -d .
        cp -R ImGui/* . || true
        cp -R iOS-Imgui-ModMenu-main/* . || true
        cp -R iOS-ImGui-ModMenu-d-main/* . || true

    - name: Smart Code Patch
      run: |
        # Create a dummy Mods.mm to satisfy the Makefile without using sed
        touch Mods.mm
        echo "void LoadMods() {}" >> Mods.mm
        echo "int _mods = 0;" >> Mods.mm

        # Inject compiler flags into Makefile to bypass all strict template errors
        if [ -f Makefile ]; then
          echo "ADDITIONAL_CFLAGS = -Wno-error=missing-template-arg-list-after-template-kw -Wno-error=module-import-in-extern-c -Wno-implicit-function-declaration -Wno-unused-variable -Wno-unused-function -Wno-return-type -Wno-error" >> Makefile
          echo "ADDITIONAL_OBJCFLAGS = -Wno-error=missing-template-arg-list-after-template-kw -Wno-error=module-import-in-extern-c -Wno-implicit-function-declaration -Wno-unused-variable -Wno-unused-function -Wno-return-type -Wno-error" >> Makefile
        fi
        
        # Bypass strict errors inside Unity.h manually
        if [ -f Includes/Unity/Unity.h ]; then
          sed -i '' 's/->template toCPPList/->toCPPList/g' Includes/Unity/Unity.h
        fi

    - name: Set up Manual Theos Environment
      run: |
        brew install ldid xz
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: Link Built-in iOS SDK
      run: |
        mkdir -p ~/theos/sdks
        SYS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        ln -s "$SYS_SDK" ~/theos/sdks/iPhoneOS.sdk

    - name: Compile Project
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1 GO_EASY=1

    - name: Upload .dylib Artifact
      uses: actions/upload-artifact@v4
      with:
        name: iOS-Menu-Dylib
        path: .theos/obj/*.dylib
