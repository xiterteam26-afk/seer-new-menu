name: Build iOS Menu UI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        unzip ImGui.zip -d .
        cp -R ImGui/* . || true
        cp -R iOS-Imgui-ModMenu-main/* . || true
        cp -R iOS-ImGui-ModMenu-d-main/* . || true

    - name: Ultimate Code and Compiler Patch
      run: |
        # 1. Create a real empty Mods.mm file to fix "File does not exist" and linker errors
        if [ ! -f Mods.mm ]; then
          touch Mods.mm
          echo "void LoadMods() {}" >> Mods.mm
          echo "int _mods = 0;" >> Mods.mm
        fi

        # 2. Force append absolute include paths and silence ALL compiler warnings/errors
        if [ -f Makefile ]; then
          echo "ADDITIONAL_CFLAGS = -I. -I./ImGui -I./Includes -Wno-error -Wno-everything" >> Makefile
          echo "ADDITIONAL_OBJCFLAGS = -I. -I./ImGui -I./Includes -Wno-error -Wno-everything" >> Makefile
          echo "ADDITIONAL_CCFLAGS = -I. -I./ImGui -I./Includes -Wno-error -Wno-everything" >> Makefile
        fi
        
        # 3. Fix the template syntax layout issue inside Unity.h
        if [ -f Includes/Unity/Unity.h ]; then
          sed -i '' 's/->template toCPPList/->toCPPList/g' Includes/Unity/Unity.h
        fi

        # 4. Fix C++ module import leak inside extern "C" blocks (Dobby Engine headers)
        find . -name "dobby_defines.h" -type f | while read -r file; do
          sed -i '' 's/#include <stdint.h>//g' "$file"
          sed -i '' '1s/^/#include <stdint.h>\n/' "$file"
        done

    - name: Set up Manual Theos Environment
      run: |
        brew install ldid xz
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: Link Built-in iOS SDK
      run: |
        mkdir -p ~/theos/sdks
        SYS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        ln -s "$SYS_SDK" ~/theos/sdks/iPhoneOS.sdk

    - name: Compile Project
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1 GO_EASY=1

    - name: Upload .dylib Artifact
      uses: actions/upload-artifact@v4
      with:
        name: iOS-Menu-Dylib
        path: .theos/obj/*.dylib
