name: Build iOS Menu UI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        unzip ImGui.zip -d .
        cp -R ImGui/* . || true
        cp -R iOS-Imgui-ModMenu-main/* . || true
        cp -R iOS-ImGui-ModMenu-d-main/* . || true

    - name: Dynamic Makefile & Code Fix
      run: |
        # Makefile එක ඇතුලේ තියෙන නිශ්චිත ෆයිල් නාමයන් අයින් කර සියලුම ෆයිල්ස් ඔටෝ එකතු කර ගැනීම
        if [ -f Makefile ]; then
          sed -i '' 's/iOSImGui_FILES.*/iOSImGui_FILES = $(wildcard *.mm) $(wildcard *.cpp) $(wildcard ImGui\/*.mm) $(wildcard ImGui\/*.cpp) $(wildcard Includes\/*\/*.mm) $(wildcard Includes\/*\/*.m)/g' Makefile
          echo "ADDITIONAL_CFLAGS = -Wno-error=missing-template-arg-list-after-template-kw -Wno-error=module-import-in-extern-c -Wno-implicit-function-declaration -Wno-unused-variable -Wno-unused-function -Wno-return-type" >> Makefile
          echo "ADDITIONAL_OBJCFLAGS = -Wno-error=missing-template-arg-list-after-template-kw -Wno-error=module-import-in-extern-c -Wno-implicit-function-declaration -Wno-unused-variable -Wno-unused-function -Wno-return-type" >> Makefile
        fi
        
        # Unity.h Syntax Error එක මඟහැරවීම
        if [ -f Includes/Unity/Unity.h ]; then
          sed -i '' 's/->template toCPPList/->toCPPList/g' Includes/Unity/Unity.h
        fi

    - name: Set up Manual Theos Environment
      run: |
        brew install ldid xz
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: Link Built-in iOS SDK
      run: |
        mkdir -p ~/theos/sdks
        SYS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        ln -s "$SYS_SDK" ~/theos/sdks/iPhoneOS.sdk

    - name: Compile Project
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1 GO_EASY=1

    - name: Upload .dylib Artifact
      uses: actions/upload-artifact@v4
      with:
        name: iOS-Menu-Dylib
        path: .theos/obj/*.dylib
