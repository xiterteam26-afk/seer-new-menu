name: Build iOS Menu UI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        unzip ImGui.zip -d .
        cp -R ImGui/* . || true
        cp -R iOS-Imgui-ModMenu-main/* . || true
        cp -R iOS-ImGui-ModMenu-d-main/* . || true

    - name: Ultimate Code &豪 Fix
      run: |
        # Makefile එක සකස් කිරීම සහ Warnings/Errors Skip කිරීම
        if [ -f Makefile ]; then
          sed -i '' 's/Mods.mm//g' Makefile
          echo "ADDITIONAL_CFLAGS = -Wno-error=missing-template-arg-list-after-template-kw -Wno-error=module-import-in-extern-c -Wno-implicit-function-declaration -Wno-unused-variable -Wno-unused-function" >> Makefile
          echo "ADDITIONAL_OBJCFLAGS = -Wno-error=missing-template-arg-list-after-template-kw -Wno-error=module-import-in-extern-c -Wno-implicit-function-declaration -Wno-unused-variable -Wno-unused-function" >> Makefile
        fi
        
        # Unity.h Syntax Error එක මඟහැරවීම
        if [ -f Includes/Unity/Unity.h ]; then
          sed -i '' 's/->template toCPPList/->toCPPList/g' Includes/Unity/Unity.h
        fi

    - name: Set up Manual Theos Environment
      run: |
        # ලෙඩ දෙන Installer එක වෙනුවට අතින්ම Theos Setup කිරීම
        brew install ldid xz
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: Manual SDK Patch (Fix GitHub API Failure)
      run: |
        # API එකට කතා නොකර කෙලින්ම SDK එක බාගත කිරීම
        mkdir -p ~/theos/sdks
        curl -L https://github.com/theos/sdks/raw/master/iPhoneOS16.5.sdk.tar.xz -o ~/theos/sdks/iPhoneOS16.5.sdk.tar.xz
        tar -xf ~/theos/sdks/iPhoneOS16.5.sdk.tar.xz -C ~/theos/sdks/
        rm ~/theos/sdks/iPhoneOS16.5.sdk.tar.xz

    - name: Compile Project
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1 GO_EASY=1

    - name: Upload .dylib Artifact
      uses: actions/upload-artifact@v4
      with:
        name: iOS-Menu-Dylib
        path: .theos/obj/*.dylib
